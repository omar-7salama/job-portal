version: '3.8'
services:
  # ─── Databases (Development) ──────────────────────────────
  userdb:
    ports:
      - "5432:5432"
    volumes:
      - userdb_data_dev:/var/lib/postgresql/data

  jobdb:
    ports:
      - "5433:5432"
    volumes:
      - jobdb_data_dev:/var/lib/postgresql/data

  applicationdb:
    ports:
      - "5434:5432"
    volumes:
      - applicationdb_data_dev:/var/lib/postgresql/data

  # ─── Backend Services (Development) ──────────────────────
  user-service:
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: dev

  job-service:
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: dev

  application-service:
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: dev

  # ─── Frontend (Development) ───────────────────────────────
  frontend:
    ports:
      - "3000:80"

  # ─── Monitoring (Development) ─────────────────────────────
  prometheus:
    ports:
      - "9090:9090"

  grafana:
    ports:
      - "3001:3000"

# ─── Volumes (Development) ─────────────────────────────────
volumes:
  userdb_data_dev:
  jobdb_data_dev:
  applicationdb_data_dev: