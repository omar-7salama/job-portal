version: '3.8'

services:
  # ─── Databases ───────────────────────────────────────────
  userdb:
    container_name: userdb-dev
    ports:
      - "5432:5432"
    volumes:
      - userdb_data_dev:/var/lib/postgresql/data

  jobdb:
    container_name: jobdb-dev
    ports:
      - "5433:5432"
    volumes:
      - jobdb_data_dev:/var/lib/postgresql/data

  applicationdb:
    container_name: applicationdb-dev
    ports:
      - "5434:5432"
    volumes:
      - applicationdb_data_dev:/var/lib/postgresql/data

  # ─── Backend Services ─────────────────────────────────────
  user-service:
    container_name: user-service-dev
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: dev

  job-service:
    container_name: job-service-dev
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: dev

  application-service:
    container_name: application-service-dev
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: dev

  # ─── Frontend ─────────────────────────────────────────────
  frontend:
    container_name: frontend-dev
    ports:
      - "3000:80"

# ─── Volumes ─────────────────────────────────────────────
volumes:
  userdb_data_dev:
  jobdb_data_dev:
  applicationdb_data_dev:
