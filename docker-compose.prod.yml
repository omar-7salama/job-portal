version: '3.8'

services:
  # ─── Databases (Production) ───────────────────────────────
  userdb:
    restart: always
    volumes:
      - userdb_data_prod:/var/lib/postgresql/data

  jobdb:
    restart: always
    volumes:
      - jobdb_data_prod:/var/lib/postgresql/data

  applicationdb:
    restart: always
    volumes:
      - applicationdb_data_prod:/var/lib/postgresql/data

  # ─── Backend Services (Production - Internal Only) ────────
  user-service:
    environment:
      SPRING_PROFILES_ACTIVE: prod
    restart: always

  job-service:
    environment:
      SPRING_PROFILES_ACTIVE: prod
    restart: always

  application-service:
    environment:
      SPRING_PROFILES_ACTIVE: prod
    restart: always

  # ─── Frontend (Production) ────────────────���───────────────
  frontend:
    ports:
      - "8080:80"
    restart: always

# ─── Volumes (Production) ──────────────────────────────────
volumes:
  userdb_data_prod:
  jobdb_data_prod:
  applicationdb_data_prod:
