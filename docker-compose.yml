version: '3.8'

services:
  # ─── Databases ───────────────────────────────────────────
  userdb:
    image: postgres:15
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - userdb_data:/var/lib/postgresql/data
    networks:
      - jobportal-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  jobdb:
    image: postgres:15
    environment:
      POSTGRES_DB: jobdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - jobdb_data:/var/lib/postgresql/data
    networks:
      - jobportal-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  applicationdb:
    image: postgres:15
    environment:
      POSTGRES_DB: applicationdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - applicationdb_data:/var/lib/postgresql/data
    networks:
      - jobportal-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend Services ─────────────────────────────────────
  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://userdb:5432/userdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      userdb:
        condition: service_healthy
    networks:
      - jobportal-network

  job-service:
    build:
      context: .
      dockerfile: job-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://jobdb:5432/jobdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      jobdb:
        condition: service_healthy
    networks:
      - jobportal-network

  application-service:
    build:
      context: .
      dockerfile: application-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://applicationdb:5432/applicationdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      USER_SERVICE_URL: http://user-service:8081
      JOB_SERVICE_URL: http://job-service:8082
    depends_on:
      applicationdb:
        condition: service_healthy
      user-service:
        condition: service_started
      job-service:
        condition: service_started
    networks:
      - jobportal-network

  # ─── Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    depends_on:
      - user-service
      - job-service
      - application-service
    networks:
      - jobportal-network

# ─── Volumes ─────────────────────────────────────────────
volumes:
  userdb_data:
  jobdb_data:
  applicationdb_data:

# ─── Network ─────────────────────────────────────────────
networks:
  jobportal-network:
    driver: bridge
