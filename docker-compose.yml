version: '3.8'

services:

  # ─── Databases ───────────────────────────────────────────

  userdb:
    image: postgres:15
    container_name: userdb-dev
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - userdb_data_dev:/var/lib/postgresql/data
    networks:
      - jobportal-network

  jobdb:
    image: postgres:15
    container_name: jobdb-dev
    environment:
      POSTGRES_DB: jobdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - jobdb_data_dev:/var/lib/postgresql/data
    networks:
      - jobportal-network

  applicationdb:
    image: postgres:15
    container_name: applicationdb-dev
    environment:
      POSTGRES_DB: applicationdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - applicationdb_data_dev:/var/lib/postgresql/data
    networks:
      - jobportal-network

  # ─── Services ────────────────────────────────────────────

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service-dev
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://userdb:5432/userdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_PROFILES_ACTIVE: dev
    depends_on:
      - userdb
    networks:
      - jobportal-network

  job-service:
    build:
      context: .
      dockerfile: job-service/Dockerfile
    container_name: job-service-dev
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://jobdb:5432/jobdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_PROFILES_ACTIVE: dev
    depends_on:
      - jobdb
    networks:
      - jobportal-network

  application-service:
    build:
      context: .
      dockerfile: application-service/Dockerfile
    container_name: application-service-dev
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://applicationdb:5432/applicationdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      USER_SERVICE_URL: http://user-service:8081
      JOB_SERVICE_URL: http://job-service:8082
      SPRING_PROFILES_ACTIVE: dev
    depends_on:
      - applicationdb
      - user-service
      - job-service
    networks:
      - jobportal-network

# ─── Volumes ─────────────────────────────────────────────

volumes:
  userdb_data_dev:
  jobdb_data_dev:
  applicationdb_data_dev:

# ─── Network ─────────────────────────────────────────────

networks:
  jobportal-network:
    driver: bridge
