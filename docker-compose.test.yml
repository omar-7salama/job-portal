version: '3.8'

services:
  # ─── Databases (Testing) ──────────────────────────────────
  userdb:
    volumes:
      - userdb_data_test:/var/lib/postgresql/data

  jobdb:
    volumes:
      - jobdb_data_test:/var/lib/postgresql/data

  applicationdb:
    volumes:
      - applicationdb_data_test:/var/lib/postgresql/data

  # ─── Backend Services (Testing) ────────────────────────────
  user-service:
    ports:
      - "8181:8081"
    environment:
      SPRING_PROFILES_ACTIVE: test
    restart: on-failure

  job-service:
    ports:
      - "8182:8082"
    environment:
      SPRING_PROFILES_ACTIVE: test
    restart: on-failure

  application-service:
    ports:
      - "8183:8083"
    environment:
      SPRING_PROFILES_ACTIVE: test
    restart: on-failure

  # ─── Frontend (Testing) ───────────────────────────────────
  frontend:
    ports:
      - "3001:80"

# ─── Volumes (Testing) ─────────────────────────────────────
volumes:
  userdb_data_test:
  jobdb_data_test:
  applicationdb_data_test:
